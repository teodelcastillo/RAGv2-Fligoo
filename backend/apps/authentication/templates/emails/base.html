<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block title %}Ecofilia{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f7f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
    }
    .wrapper {
      width: 100%;
      background-color: #f4f7f4;
      padding: 40px 16px;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .header {
      background-color: #1a3d2b;
      padding: 32px 40px;
      text-align: center;
    }
    .header-logo {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .header-logo span {
      color: #6fcf97;
    }
    .body {
      padding: 40px 40px 32px;
    }
    .greeting {
      font-size: 22px;
      font-weight: 600;
      color: #1a3d2b;
      margin: 0 0 16px;
    }
    .text {
      font-size: 15px;
      line-height: 1.7;
      color: #4a4a4a;
      margin: 0 0 24px;
    }
    .btn-wrapper {
      text-align: center;
      margin: 32px 0;
    }
    .btn {
      display: inline-block;
      background-color: #1a3d2b;
      color: #ffffff !important;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 8px;
      letter-spacing: 0.2px;
    }
    .divider {
      border: none;
      border-top: 1px solid #e8ede8;
      margin: 28px 0;
    }
    .fallback {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
    }
    .fallback a {
      color: #2d7a4f;
      word-break: break-all;
    }
    .footer {
      background-color: #f4f7f4;
      padding: 24px 40px;
      text-align: center;
    }
    .footer-text {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">

      <div class="header">
        <div class="header-logo">eco<span>filia</span></div>
      </div>

      <div class="body">
        {% block content %}{% endblock %}
      </div>

      <div class="footer">
        <p class="footer-text">
          © 2025 Ecofilia · Este correo fue enviado a {{ recipient_email }}<br />
          Si no realizaste esta acción, podés ignorar este mensaje.
        </p>
      </div>

    </div>
  </div>
</body>
</html>

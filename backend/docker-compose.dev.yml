# Stack local para desarrollo/test en tu PC (no para prod).
#
#   1. cp docker/template.env docker/.env   (y completá OPENAI_API_KEY / ANTHROPIC_API_KEY)
#   2. docker compose -f docker-compose.dev.yml up --build
#   3. Abrí http://localhost:8000/health/
#
# Corre las migraciones solo (esperando a que la DB esté lista) y deja el
# runserver de Django escuchando. La DB persiste en el volumen pg_dev_data.

services:
  db:
    image: ankane/pgvector
    container_name: ecofilia-db-dev
    env_file: ./docker/.env
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    image: ecofilia-backend:dev
    container_name: ecofilia-backend-dev
    command: >
      bash -c "until ./manage.py migrate; do echo '[wait] esperando a la DB...'; sleep 3; done
      && ./manage.py runserver 0:80"
    env_file:
      - ./docker/.env
    volumes:
      - .:/code
    ports:
      - "8000:80"
    stdin_open: true
    tty: true
    depends_on:
      - db
    networks:
      - app-network

volumes:
  pg_dev_data:

networks:
  app-network:
    driver: bridge
